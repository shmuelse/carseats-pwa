<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07070f" />
    <script src="local-dev.js"></script>
    <script src="theme.js"></script>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
    <title>בחירת רכב</title>
    <style>
      .vehicle-home {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .vehicle-panel {
        width: min(100%, 460px);
      }

      .vehicle-title {
        margin-bottom: 18px;
        text-align: center;
      }

      .vehicle-title img {
        width: 92px;
        height: 92px;
        margin-bottom: 12px;
      }

      .vehicle-grid {
        display: grid;
        gap: 12px;
      }

      .vehicle-card {
        display: block;
        padding: 20px;
        color: var(--text);
        text-decoration: none;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
      }

      .vehicle-card strong {
        display: block;
        margin-bottom: 6px;
        font-size: 18px;
      }

      .vehicle-card span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>

  <body>
    <main class="vehicle-home">
      <section class="vehicle-panel">
        <div class="vehicle-title">
          <img src="icons/car-seats-icon.svg" alt="" />
          <h1>איזה רכב נוסע היום?</h1>
          <p class="hint">לכל רכב נשמרת תורנות נפרדת.</p>
        </div>

        <div id="installBanner"></div>

        <div class="vehicle-grid">
          <a class="vehicle-card" href="index.html">
            <strong>🚙 רכב משפחתי — 7 מקומות</strong>
            <span>מושב קדמי, שלושה באמצע ושניים מאחור.</span>
          </a>

          <a class="vehicle-card" href="five-seat.html">
            <strong>🚗 רכב רגיל — 5 מקומות</strong>
            <span>נהג, ילד בתור במושב הקדמי ושלושה ילדים מאחור.</span>
          </a>
        </div>
      </section>
    </main>

    <script src="supabase-config.js" defer></script>
    <script src="install-analytics.js" defer></script>
    <script src="vehicle-router.js" defer></script>
    <script src="pwa-install.js" defer></script>
  </body>
</html>
